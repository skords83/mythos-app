version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: mythos-db
    environment:
      POSTGRES_USER: mythos
      POSTGRES_PASSWORD: mythos_dev_password
      POSTGRES_DB: mythos
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mythos"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mythos-app
    environment:
      DATABASE_URL: postgresql://mythos:mythos_dev_password@db:5432/mythos
      NODE_ENV: development
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
