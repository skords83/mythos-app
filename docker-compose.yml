services:
  db:
    image: postgres:15-alpine
    container_name: mythos-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mythos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-mythos}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mythos}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal
  app:
    image: ghcr.io/skords83/mythos-app/app:latest
    container_name: mythos-app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mythos}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-mythos}
      NODE_ENV: production
      PORT: 4000
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/app/public/uploads
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mythos.rule=Host(`mythos.skords.de`)"
      - "traefik.http.routers.mythos.entrypoints=websecure"
      - "traefik.http.routers.mythos.tls.certresolver=letsencrypt"
      - "traefik.http.services.mythos.loadbalancer.server.port=4000"
    networks:
      - proxy
      - internal
volumes:
  postgres_data:
  uploads_data:
networks:
  proxy:
    external: true
  internal: